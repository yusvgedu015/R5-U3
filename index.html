<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal Inteligente de Noticias</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header>

<h1>Portal Inteligente de Noticias</h1>

<div class="controls">

<input id="searchInput" type="text" placeholder="Buscar noticias">

<select id="categorySelect">

<option value="technology">Tecnología</option>
<option value="business">Negocios</option>
<option value="science">Ciencia</option>
<option value="health">Salud</option>
<option value="sports">Deportes</option>
<option value="entertainment">Entretenimiento</option>

</select>

<button id="darkModeBtn">Modo Oscuro</button>

</div>

</header>

<main>

<h2>Noticias</h2>

<section id="newsContainer"></section>

<h2>Favoritos</h2>

<section id="favoritesContainer"></section>

</main>

<script type="module" src="app.js"></script>

</body>
</html>
